name: CI/CD Pipeline - Ansible Deployment

on:
  push:
    branches: [main, dev, staging]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "=== Verifying Ansible project structure ==="
          test -d roles/common && echo "✓ roles/common exists"
          test -d roles/app_deployment && echo "✓ roles/app_deployment exists"
          test -d roles/service_management && echo "✓ roles/service_management exists"
          test -d inventory && echo "✓ inventory exists"
          test -f playbooks/site.yml && echo "✓ playbooks/site.yml exists"
          echo "=== Build stage complete ==="

      - name: Lint Ansible playbook
        run: |
          pip install ansible-lint
          ansible-lint playbooks/site.yml || true

  deploy-dev:
    name: Deploy to Dev
    needs: build
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible
      - name: Create vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
      - name: Deploy to Dev
        run: |
          echo "=== Deploying to DEV environment ==="
          ansible-playbook -i inventory/dev.ini playbooks/site.yml --vault-password-file .vault_pass --syntax-check
          echo "=== Dev deployment complete ==="
      - name: Cleanup vault password
        if: always()
        run: rm -f .vault_pass

  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible
      - name: Create vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
      - name: Deploy to Staging
        run: |
          echo "=== Deploying to STAGING environment ==="
          ansible-playbook -i inventory/staging.ini playbooks/site.yml --vault-password-file .vault_pass --syntax-check
          echo "=== Staging deployment complete ==="
      - name: Cleanup vault password
        if: always()
        run: rm -f .vault_pass

  deploy-production:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible
      - name: Create vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
      - name: Deploy to Production
        run: |
          echo "=== Deploying to PRODUCTION environment ==="
          ansible-playbook -i inventory/production.ini playbooks/site.yml --vault-password-file .vault_pass --syntax-check
          echo "=== Production deployment complete ==="
      - name: Cleanup vault password
        if: always()
        run: rm -f .vault_pass

  verify:
    name: Verify
    needs: [deploy-dev, deploy-staging, deploy-production]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Verify deployment files
        run: |
          echo "=== Verification stage ==="
          python3 -c "
          import yaml, sys
          for f in ['playbooks/site.yml', 'inventory/group_vars/all.yml']:
              try:
                  yaml.safe_load(open(f))
                  print(f'✓ {f} - valid YAML')
              except Exception as e:
                  print(f'✗ {f} - {e}')
                  sys.exit(1)
          "
          echo "=== All verifications passed ==="
