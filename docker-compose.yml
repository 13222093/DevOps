version: '3'
services:
  dev:
    build:
      context: .
      args:
        SSH_PASSWORD: ${SSH_PASSWORD:-ansible}
    container_name: ansible-dev
    ports:
      - "2221:22"
  staging:
    build:
      context: .
      args:
        SSH_PASSWORD: ${SSH_PASSWORD:-ansible}
    container_name: ansible-staging
    ports:
      - "2222:22"
  production:
    build:
      context: .
      args:
        SSH_PASSWORD: ${SSH_PASSWORD:-ansible}
    container_name: ansible-production
    ports:
      - "2223:22"
